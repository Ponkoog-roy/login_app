name: CI/CD Pipeline - Login App ##2.0111

on:
  push:
    branches:
      - main

permissions:
  contents: write   # Required for creating releases

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Install frontend dependencies
        run: |
          test -f frontend/index.html
          echo "Frontend files verified"

      - name: Run backend tests
        run: cd backend && npm test

      - name: Mock frontend tests
        run: |
          echo "No frontend test framework configured"

      - name: Build frontend Docker image
        run: docker build -t ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_USER }}/login_app-frontend:latest ./frontend

      - name: Build backend Docker image
        run: docker build -t ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_USER }}/login_app-backend:latest ./backend

      - name: Tag Docker images
        run: |
          echo "Tagging images with commit SHA..."
          docker tag ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_USER }}/login_app-frontend:latest ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_USER }}/login_app-frontend:${{ github.sha }}
          docker tag ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_USER }}/login_app-backend:latest ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_USER }}/login_app-backend:${{ github.sha }}

      - name: Log in to Docker registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_URL }} -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Push Docker images
        run: |
          docker push ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_USER }}/login_app-frontend:${{ github.sha }}
          docker push ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_USER }}/login_app-backend:${{ github.sha }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.sha }}   # ✅ valid tag name
          name: "Release ${{ github.sha }}"
          body: "Automated release from CI/CD pipeline"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for cluster credentials
        id: cluster
        run: |
          if [ -n "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "mock=false" >> "$GITHUB_OUTPUT"
          else
            echo "mock=true" >> "$GITHUB_OUTPUT"
          fi

      #- name: Set up kubeconfig
      #  if: steps.cluster.outputs.mock == 'false'
       # run: |
        #  mkdir -p "$HOME/.kube"
         # echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Set image tags in manifests
        if: steps.cluster.outputs.mock == 'false'
        run: |
          sed -i "s|image: .*|image: ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_USER }}/login_app-backend:${{ github.sha }}|" k8s/backend-deployment.yaml
          sed -i "s|image: .*|image: ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_USER }}/login_app-frontend:${{ github.sha }}|" k8s/frontend-deployment.yaml

     # - name: Deploy to Kubernetes
       # if: steps.cluster.outputs.mock == 'false'
        #run: |
         # kubectl apply -f k8s/backend-configmap.yaml
          #kubectl apply -f k8s/backend-secret-example.yaml
          #kubectl apply -f k8s/backend-deployment.yaml
          #kubectl apply -f k8s/backend-service.yaml
          #kubectl apply -f k8s/frontend-deployment.yaml
          #kubectl apply -f k8s/frontend-service.yaml
          #kubectl apply -f k8s/ingress.yaml
         # kubectl rollout status deployment/login-backend --timeout=120s
         # kubectl rollout status deployment/login-frontend --timeout=120s

      - name: Mock deploy to Kubernetes (no cluster configured)
        if: steps.cluster.outputs.mock == 'true'
        run: |
          echo "No cluster configured (secrets.KUBE_CONFIG is empty)."
          echo "Validating manifests that would be applied:"
          for f in k8s/backend-configmap.yaml k8s/backend-secret-example.yaml \
                   k8s/backend-deployment.yaml k8s/backend-service.yaml \
                   k8s/frontend-deployment.yaml k8s/frontend-service.yaml \
                   k8s/ingress.yaml; do
            test -f "$f" && echo "  OK  $f (would: kubectl apply -f $f)" || (echo "  MISSING  $f" && exit 1)
          done
          echo "Would deploy backend image:  ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_USER }}/login_app-backend:${{ github.sha }}"
          echo "Would deploy frontend image: ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_USER }}/login_app-frontend:${{ github.sha }}"
          echo "Set repo secret KUBE_CONFIG (base64-encoded kubeconfig) to deploy for real."
