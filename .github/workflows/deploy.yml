name: CI/CD Pipeline - Login App

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: login-app-cluster

jobs:

  build-test-push:
    name: Build Test Push
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Image Tag
        id: vars
        run: |
          echo "image_tag=sha-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Run Backend Tests
        run: |
          cd backend
          npm test

      - name: Verify Frontend Files
        run: |
          test -f frontend/index.html

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        run: |
          aws ecr-public get-login-password \
          --region us-east-1 | \
          docker login \
          --username AWS \
          --password-stdin public.ecr.aws

      - name: Build Backend Image
        run: |
          docker build \
            -t public.ecr.aws/${{ secrets.ECR_PUBLIC_ALIAS }}/login_app-backend:${{ steps.vars.outputs.image_tag }} \
            ./backend

      - name: Build Frontend Image
        run: |
          docker build \
            -t public.ecr.aws/${{ secrets.ECR_PUBLIC_ALIAS }}/login_app-frontend:${{ steps.vars.outputs.image_tag }} \
            ./frontend

      - name: Push Backend Image
        run: |
          docker push \
            public.ecr.aws/${{ secrets.ECR_PUBLIC_ALIAS }}/login_app-backend:${{ steps.vars.outputs.image_tag }}

      - name: Push Frontend Image
        run: |
          docker push \
            public.ecr.aws/${{ secrets.ECR_PUBLIC_ALIAS }}/login_app-frontend:${{ steps.vars.outputs.image_tag }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-test-push

    steps:

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ needs.build-test-push.outputs.image_tag }}
          name: Release ${{ needs.build-test-push.outputs.image_tag }}
          generate_release_notes: true

  deploy:
    name: Deploy To EKS
    runs-on: ubuntu-latest
    needs:
      - build-test-push
      - release

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
          --region us-east-1 \
          --name ${EKS_CLUSTER_NAME}

      - name: Replace Image Tags
        run: |
          sed -i "s|IMAGE_TAG_PLACEHOLDER|${{ needs.build-test-push.outputs.image_tag }}|g" k8s/backend-deployment.yaml

          sed -i "s|IMAGE_TAG_PLACEHOLDER|${{ needs.build-test-push.outputs.image_tag }}|g" k8s/frontend-deployment.yaml

      - name: Deploy Kubernetes Manifests
        run: |
          kubectl apply -f k8s/backend-configmap.yaml
          kubectl apply -f k8s/backend-secret-example.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Verify Backend Rollout
        run: |
          kubectl rollout status deployment/login-backend --timeout=300s

      - name: Verify Frontend Rollout
        run: |
          kubectl rollout status deployment/login-frontend --timeout=300s
