name: CI/CD Pipeline - Login App

# One pipeline, one job, run top-to-bottom in order:
#   build frontend image -> build backend image -> tag both -> push
#   (real ECR push if AWS creds are configured, mock otherwise) -> create a
#   GitHub release -> deploy both apps to Kubernetes (real if a kubeconfig
#   secret is configured, mock otherwise).

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch: {}

env:
  AWS_REGION: us-east-1
  ECR_FRONTEND_REPO: devops-assessment-frontend
  ECR_BACKEND_REPO: devops-assessment-backend
  # Short, stable tag for this build. Used everywhere instead of "latest".
  IMAGE_TAG: ${{ github.sha }}

jobs:
  pipeline:
    name: Build, Push, Release, Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Test (kept from the original pipeline; not one of the 6 required
      # stages, but a broken build should never get tagged/pushed/deployed)
      # ---------------------------------------------------------------
      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run backend tests
        run: cd backend && npm test --if-present

      - name: Verify frontend files exist
        run: |
          test -f frontend/index.html
          echo "Frontend files verified"

      # ---------------------------------------------------------------
      # 1. Build frontend Docker image
      # ---------------------------------------------------------------
      - name: Build frontend Docker image
        run: docker build -t "${ECR_FRONTEND_REPO}:${IMAGE_TAG}" ./frontend

      # ---------------------------------------------------------------
      # 2. Build backend Docker image
      # ---------------------------------------------------------------
      - name: Build backend Docker image
        run: docker build -t "${ECR_BACKEND_REPO}:${IMAGE_TAG}" ./backend

      # ---------------------------------------------------------------
      # 3. Tag both images
      #    Every image gets the immutable commit-sha tag (already applied
      #    at build time above) plus a floating "current" tag for the
      #    branch it came from. Neither tag is "latest" on its own -
      #    the sha tag is always what deploy manifests reference.
      # ---------------------------------------------------------------
      - name: Determine registry target
        id: registry
        run: |
          if [ -n "${{ secrets.ECR_REGISTRY }}" ]; then
            echo "target=${{ secrets.ECR_REGISTRY }}" >> "$GITHUB_OUTPUT"
            echo "mock=false" >> "$GITHUB_OUTPUT"
          else
            echo "target=mock-registry.local" >> "$GITHUB_OUTPUT"
            echo "mock=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag frontend image
        run: |
          docker tag "${ECR_FRONTEND_REPO}:${IMAGE_TAG}" \
            "${{ steps.registry.outputs.target }}/${ECR_FRONTEND_REPO}:${IMAGE_TAG}"
          docker tag "${ECR_FRONTEND_REPO}:${IMAGE_TAG}" \
            "${{ steps.registry.outputs.target }}/${ECR_FRONTEND_REPO}:${{ github.ref_name }}-current"

      - name: Tag backend image
        run: |
          docker tag "${ECR_BACKEND_REPO}:${IMAGE_TAG}" \
            "${{ steps.registry.outputs.target }}/${ECR_BACKEND_REPO}:${IMAGE_TAG}"
          docker tag "${ECR_BACKEND_REPO}:${IMAGE_TAG}" \
            "${{ steps.registry.outputs.target }}/${ECR_BACKEND_REPO}:${{ github.ref_name }}-current"

      # ---------------------------------------------------------------
      # 4. Push images to ECR, or mock the push if no registry is
      #    configured (no AWS credentials in repo secrets).
      # ---------------------------------------------------------------
      - name: Configure AWS credentials
        if: steps.registry.outputs.mock == 'false'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        if: steps.registry.outputs.mock == 'false'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push images to ECR
        if: steps.registry.outputs.mock == 'false'
        run: |
          docker push "${{ steps.registry.outputs.target }}/${ECR_FRONTEND_REPO}:${IMAGE_TAG}"
          docker push "${{ steps.registry.outputs.target }}/${ECR_FRONTEND_REPO}:${{ github.ref_name }}-current"
          docker push "${{ steps.registry.outputs.target }}/${ECR_BACKEND_REPO}:${IMAGE_TAG}"
          docker push "${{ steps.registry.outputs.target }}/${ECR_BACKEND_REPO}:${{ github.ref_name }}-current"

      - name: Mock push images (no ECR configured)
        if: steps.registry.outputs.mock == 'true'
        run: |
          echo "No ECR registry configured (secrets.ECR_REGISTRY is empty)."
          echo "Would push:"
          echo "  ${{ steps.registry.outputs.target }}/${ECR_FRONTEND_REPO}:${IMAGE_TAG}"
          echo "  ${{ steps.registry.outputs.target }}/${ECR_BACKEND_REPO}:${IMAGE_TAG}"
          echo "Set repo secrets ECR_REGISTRY, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY to push for real."

      # ---------------------------------------------------------------
      # 5. Create a GitHub release / release tag
      # ---------------------------------------------------------------
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.IMAGE_TAG }}
          name: "Release build-${{ env.IMAGE_TAG }}"
          body: |
            Automated release from CI/CD pipeline.
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Frontend image tag: ${{ env.IMAGE_TAG }}
            Backend image tag: ${{ env.IMAGE_TAG }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------------
      # 6. Deploy both apps to Kubernetes, or mock deploy if no
      #    kubeconfig is configured.
      # ---------------------------------------------------------------
      - name: Check for cluster credentials
        id: cluster
        run: |
          if [ -n "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "mock=false" >> "$GITHUB_OUTPUT"
          else
            echo "mock=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up kubeconfig
        if: steps.cluster.outputs.mock == 'false'
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Set image tags in manifests
        if: steps.cluster.outputs.mock == 'false'
        run: |
          sed -i "s|image: .*login_bac.*|image: ${{ steps.registry.outputs.target }}/${ECR_BACKEND_REPO}:${IMAGE_TAG}|" k8s/backend-deployment.yaml
          sed -i "s|image: .*login_front.*|image: ${{ steps.registry.outputs.target }}/${ECR_FRONTEND_REPO}:${IMAGE_TAG}|" k8s/frontend-deployment.yaml

      - name: Deploy to Kubernetes
        if: steps.cluster.outputs.mock == 'false'
        run: |
          kubectl apply -f k8s/backend-configmap.yaml
          kubectl apply -f k8s/backend-secret-example.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl rollout status deployment/login-backend --timeout=120s
          kubectl rollout status deployment/login-frontend --timeout=120s

      - name: Mock deploy to Kubernetes (no cluster configured)
        if: steps.cluster.outputs.mock == 'true'
        run: |
          echo "No cluster configured (secrets.KUBE_CONFIG is empty). Validating manifests instead:"
          for f in k8s/backend-configmap.yaml k8s/backend-secret-example.yaml \
                   k8s/backend-deployment.yaml k8s/backend-service.yaml \
                   k8s/frontend-deployment.yaml k8s/frontend-service.yaml \
                   k8s/ingress.yaml; do
            test -f "$f" && echo "  OK  $f" || (echo "  MISSING  $f" && exit 1)
          done
          echo "Would deploy frontend image: ${{ steps.registry.outputs.target }}/${ECR_FRONTEND_REPO}:${IMAGE_TAG}"
          echo "Would deploy backend image:  ${{ steps.registry.outputs.target }}/${ECR_BACKEND_REPO}:${IMAGE_TAG}"
          echo "Set repo secret KUBE_CONFIG (base64 kubeconfig) to deploy for real."