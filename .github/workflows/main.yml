name: CI/CD Pipeline - Login App  ##2.0111

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Install frontend dependencies
        run: |
          test -f frontend/index.html
          echo "Frontend files verified"

      - name: Run backend tests
        run: cd backend && npm test

      - name: Mock frontend tests
        run: |
          echo "No frontend test framework configured"

      - name: Build frontend Docker image
        run: docker build -t ${{ secrets.REGISTRY_URL }}/login_app/frontend:latest ./frontend

      - name: Build backend Docker image
        run: docker build -t ${{ secrets.REGISTRY_URL }}/login_app/backend:latest ./backend

      - name: Tag Docker images
        run: |
           echo "Pushing frontend image to registry..."
           echo "Pushing backend image to registry..."
         # docker tag ${{ secrets.REGISTRY_URL }}/login_app/frontend:latest ${{ secrets.REGISTRY_URL }}/login_app/frontend:${{ github.sha }}
         # docker tag ${{ secrets.REGISTRY_URL }}/login_app/backend:latest ${{ secrets.REGISTRY_URL }}/login_app/backend:${{ github.sha }}

      - name: Log in to Docker registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_URL }} -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Push Docker images
        run: |
          docker push ${{ secrets.REGISTRY_URL }}/login_app/frontend:${{ github.sha }}
          docker push ${{ secrets.REGISTRY_URL }}/login_app/backend:${{ github.sha }}
      
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.sha }}
          release_name: "Release ${{ github.sha }}"
          body: "Automated release from CI/CD pipeline"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to Remote Server
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" -H "${{ secrets.SERVER_HOST }}" >> "$HOME/.ssh/known_hosts"

      - name: Test SSH connectivity
        run: nc -zv "${{ secrets.SERVER_HOST }}" "${{ secrets.SERVER_PORT }}"

      - name: Copy project files to server
        run: |
          scp -P "${{ secrets.SERVER_PORT }}" -i "$HOME/.ssh/id_rsa" \
            -r backend frontend docker-compose.yml \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Deploy on server (Docker Compose)
        run: |
          ssh -p "${{ secrets.SERVER_PORT }}" -i "$HOME/.ssh/id_rsa" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" << 'EOF'
          set -e
          cd "${{ secrets.DEPLOY_PATH }}"

          echo "==> Ensuring Docker network exists..."
          docker network create validator-net || true

          echo "==> Building and restarting services..."
          docker compose up -d --build --remove-orphans

          echo "==> Deployment complete!"
          EOF

      - name: Verify deployment
        run: |
          ssh -p "${{ secrets.SERVER_PORT }}" -i "$HOME/.ssh/id_rsa" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "cd '${{ secrets.DEPLOY_PATH }}' && docker compose ps"

      - name: Mock Kubernetes deploy
        run: |
          test -f k8s/backend-deployment.yaml
          test -f k8s/frontend-deployment.yaml
          test -f k8s/frontend-service.yaml
          test -f k8s/ingress.yaml
          echo "Kubernetes manifests validated"
