<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Secure login portal — authenticate and manage your session." />
  <title>SecureAuth — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Animated background orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- ==================== LOGIN VIEW ==================== -->
  <main id="login-view" class="view active">
    <div class="card glass">
      <div class="card-header">
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-icon">
            <rect width="40" height="40" rx="12" fill="url(#logo-grad)"/>
            <path d="M12 20L18 26L28 14" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <defs><linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/></linearGradient></defs>
          </svg>
        </div>
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to your account</p>
      </div>

      <form id="login-form" autocomplete="off">
        <div class="input-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M10 10a4 4 0 100-8 4 4 0 000 8zm-7 8a7 7 0 0114 0H3z"/></svg>
            <input type="text" id="username" name="username" placeholder="Enter your username" required />
          </div>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
            <input type="password" id="password" name="password" placeholder="Enter your password" required />
          </div>
        </div>

        <div id="login-error" class="error-msg" role="alert"></div>

        <button type="submit" id="login-btn" class="btn btn-primary">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader" aria-hidden="true"></span>
        </button>
      </form>

      <div class="card-footer">
        <p class="hint">Demo credentials: <strong>admin</strong> / <strong>password123</strong></p>
      </div>
    </div>
  </main>

  <!-- ==================== DASHBOARD VIEW ==================== -->
  <section id="dashboard-view" class="view">
    <div class="dashboard-card glass">
      <div class="dashboard-header">
        <div class="avatar" id="avatar-letter">A</div>
        <div class="user-info">
          <h2 id="welcome-name">Welcome, admin</h2>
          <span class="badge" id="user-role">Administrator</span>
        </div>
      </div>

      <div class="dashboard-body">
        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-icon" style="--accent: #6366f1;">
              <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>
            </div>
            <div class="stat-text">
              <span class="stat-label">Session Started</span>
              <span class="stat-value" id="session-time">—</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="--accent: #a855f7;">
              <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
            </div>
            <div class="stat-text">
              <span class="stat-label">Status</span>
              <span class="stat-value status-active">Authenticated</span>
            </div>
          </div>
        </div>
      </div>

      <button id="logout-btn" class="btn btn-danger">
        <svg viewBox="0 0 20 20" fill="currentColor" class="btn-icon"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 001 1h12a1 1 0 001-1V4a1 1 0 00-1-1H3zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/></svg>
        <span>Sign Out</span>
      </button>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
