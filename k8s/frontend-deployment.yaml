apiVersion: apps/v1
kind: Deployment
metadata:
  name: login-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: login-frontend
  template:
    metadata:
      labels:
        app: login-frontend
    spec:
      containers:
      - name: frontend
        image: ponkoog/login_front:v4   # not 'latest'
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
